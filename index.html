<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Petualangan Rachel!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        
        body {
            font-family: 'Fredoka One', cursive;
            background-color: #8be15c;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 450px;
            background-color: #a3e635;
            border-radius: 20px;
            border: 4px solid #fff;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .waypoint {
            position: absolute;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .marker-icon {
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 0px rgba(0,0,0,0.2));
        }

        .time-badge {
            background: white;
            color: #ec4899;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 5px;
            border: 2px solid #ec4899;
            opacity: 0; 
            transition: opacity 0.5s;
            white-space: nowrap;
        }

        #avatar {
            position: absolute;
            top: 15%;
            left: 20%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            z-index: 20;
            transition: all 2.5s ease-in-out;
            filter: drop-shadow(2px 4px 0px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-6 border-4 border-pink-400">
        
        <div class="text-center mb-6">
            <h1 class="text-3xl text-pink-500 mb-2">Petualangan Rachel! 🎒🗺️</h1>
            <p class="text-gray-600 font-sans text-sm mb-4">Atur jadwal berangkat dan dijemput pulangnya!</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="flex flex-col items-center bg-blue-50 p-3 rounded-xl border-2 border-blue-200">
                <label class="text-xs text-blue-600 mb-1">Berangkat Rumah:</label>
                <input type="time" id="waktuBerangkat" class="text-lg p-1 border-2 border-blue-400 rounded-lg focus:outline-none w-full text-center mb-2 font-sans font-bold">
                <button onclick="mulaiPergi()" class="bg-blue-400 hover:bg-blue-500 text-white w-full py-2 rounded-full text-sm transition-all border-b-4 border-blue-600 active:border-b-0 active:translate-y-1">
                    Jalan! 🚀
                </button>
            </div>

            <div class="flex flex-col items-center bg-pink-50 p-3 rounded-xl border-2 border-pink-200">
                <label class="text-xs text-pink-600 mb-1">Pulang Point Lab:</label>
                <input type="time" id="waktuPulang" class="text-lg p-1 border-2 border-pink-400 rounded-lg focus:outline-none w-full text-center mb-2 font-sans font-bold">
                <button onclick="mulaiPulang()" class="bg-pink-400 hover:bg-pink-500 text-white w-full py-2 rounded-full text-sm transition-all border-b-4 border-pink-600 active:border-b-0 active:translate-y-1">
                    Dijemput! 🏍️
                </button>
            </div>
        </div>

        <div class="map-container relative">
            <svg class="path-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M 20 15 C 50 15, 80 30, 80 50 C 80 70, 40 70, 30 85" fill="none" stroke="#d97706" stroke-width="8" stroke-linecap="round" stroke-dasharray="10, 5" />
            </svg>

            <div class="waypoint" style="top: 15%; left: 20%;">
                <div class="marker-icon">🏠</div>
                <div class="text-xs text-white bg-green-600 px-2 rounded-full mt-1">Rumah</div>
                <div id="waktu-rumah" class="time-badge">--:--</div>
            </div>

            <div class="waypoint" style="top: 50%; left: 80%;">
                <div class="marker-icon">🚌</div>
                <div class="text-xs text-white bg-blue-600 px-2 rounded-full mt-1">Leuwipanjang</div>
                <div id="waktu-terminal" class="time-badge">--:--</div>
            </div>

            <div class="waypoint" style="top: 85%; left: 30%;">
                <div class="marker-icon">🏢</div>
                <div class="text-xs text-white bg-pink-500 px-2 rounded-full mt-1">Point Lab</div>
                <div id="waktu-pointlab" class="time-badge">--:--</div>
            </div>

            <div id="avatar">👧</div>
        </div>
    </div>

    <script>
        function formatWaktu(dateObj) {
            return dateObj.getHours().toString().padStart(2, '0') + ':' + 
                   dateObj.getMinutes().toString().padStart(2, '0');
        }

        function resetWaktuBadge() {
            document.getElementById('waktu-rumah').style.opacity = '0';
            document.getElementById('waktu-terminal').style.opacity = '0';
            document.getElementById('waktu-pointlab').style.opacity = '0';
        }

        function mulaiPergi() {
            const inputWaktu = document.getElementById('waktuBerangkat').value;
            if (!inputWaktu) {
                alert("Isi jam berangkat dari rumahnya dulu dong! 🕒");
                return;
            }

            let [jam, menit] = inputWaktu.split(':').map(Number);
            let waktuMulai = new Date();
            waktuMulai.setHours(jam, menit, 0);

            // Perjalanan berangkat
            let waktuTerminal = new Date(waktuMulai.getTime() + (60 * 60000));
            let waktuPointLab = new Date(waktuMulai.getTime() + (80 * 60000));

            document.getElementById('waktu-rumah').innerText = formatWaktu(waktuMulai) + " (Mulai)";
            document.getElementById('waktu-terminal').innerText = formatWaktu(waktuTerminal) + " (Tiba)";
            document.getElementById('waktu-pointlab').innerText = formatWaktu(waktuPointLab) + " (Tiba)";

            document.querySelectorAll('.time-badge').forEach(badge => badge.style.opacity = '1');

            const avatar = document.getElementById('avatar');
            avatar.style.transition = 'none';
            avatar.style.top = '15%';
            avatar.style.left = '20%';
            avatar.innerText = '👧'; 

            setTimeout(() => {
                avatar.style.transition = 'all 2.5s ease-in-out';
                avatar.style.top = '50%';
                avatar.style.left = '80%';
                avatar.innerText = '🚌💨'; 
                
                setTimeout(() => {
                    avatar.style.top = '85%';
                    avatar.style.left = '30%';
                    avatar.innerText = '🏍️👫'; // Boncengan berangkat
                }, 3000); 

            }, 50);
        }

        function mulaiPulang() {
            const inputWaktu = document.getElementById('waktuPulang').value;
            if (!inputWaktu) {
                alert("Isi jam pulangnya dulu ya! 🕒");
                return;
            }

            let [jam, menit] = inputWaktu.split(':').map(Number);
            let waktuMulaiPulang = new Date();
            waktuMulaiPulang.setHours(jam, menit, 0);

            // Perjalanan pulang (Point Lab -> Terminal = 20 menit)
            let waktuSampaiTerminal = new Date(waktuMulaiPulang.getTime() + (20 * 60000));

            resetWaktuBadge(); // Sembunyikan badge yang lama

            // Update badge untuk rute pulang
            document.getElementById('waktu-pointlab').innerText = formatWaktu(waktuMulaiPulang) + " (Pulang)";
            document.getElementById('waktu-terminal').innerText = formatWaktu(waktuSampaiTerminal) + " (Sampai)";
            
            setTimeout(() => {
                document.getElementById('waktu-pointlab').style.opacity = '1';
                document.getElementById('waktu-terminal').style.opacity = '1';
            }, 100);

            const avatar = document.getElementById('avatar');
            
            // Set karakter di Point Lab
            avatar.style.transition = 'none';
            avatar.style.top = '85%';
            avatar.style.left = '30%';
            avatar.innerText = '👧'; 

            setTimeout(() => {
                avatar.style.transition = 'all 2.5s ease-in-out';
                avatar.style.top = '50%';
                avatar.style.left = '80%';
                avatar.innerText = '🏍️👫'; // Boncengan balik ke terminal
            }, 50);
        }
    </script>
</body>
</html>
